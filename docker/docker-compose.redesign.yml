# NY-SERVER — sitedoc REDESIGN-stack (steg viii: kunderunde mot prod-kopi).
# Kjører ved siden av prod + test. Deler appnet + ML (embed/oversettelse) + postgres-containeren.
# DB: sitedoc_redesign (KOPI av prod-DB, sessions nullstilt). Domener: redesign.sitedoc.no (web 3500)
# + api-redesign.sitedoc.no (api 3501). Egne images (sitedoc-redesign-*) så prod/test-imagene står urørt.
# (Porter 3400/3401 unngås — sendfil.sitedoc.site lytter på 127.0.0.1:3400 på server-ny.)
# Forutsetter at prod-stacken (embed/oversettelse/postgres) kjører på 'appnet'.
#
# ⚠️ Bygger fra DELT build-kontekst (~/stack/sitedoc). RE-RSYNC branch `redesign/navigasjon` FØR build
#    (og tilbake til riktig branch før neste prod/test-build). Aldri --remove-orphans.
# Bygg/kjør fra repo-rot:  sudo docker compose -f docker/docker-compose.redesign.yml up -d --build
name: sitedoc-redesign                 # eget prosjektnavn — skiller redesign fra prod/test (ingen orphan-fare)
services:
  sitedoc-redesign-api:
    build: { context: .., dockerfile: docker/Dockerfile.api }
    image: sitedoc-redesign-api:latest
    container_name: sitedoc-redesign-api
    restart: unless-stopped
    env_file: ./env/api-redesign.env   # DATABASE_URL -> postgres:5432/sitedoc_redesign, AUTH_* (egen), APP_URL=https://redesign.sitedoc.no ...
    environment:
      PORT: "3501"
      HOST: "0.0.0.0"
      NORBERT_URL: "http://embed:3302"             # deler prod sin embed (statsløs modell-server)
      OVERSETTELSE_URL: "http://oversettelse:3303" # deler prod sin oversettelse
    ports:
      - "127.0.0.1:3501:3501"
      - "127.0.0.1:3500:3500"   # redesign-web lytter her (deler api sitt nett-namespace)
    networks: [appnet]
    volumes:
      # Prod sine uploads MONTERT READ-ONLY (:ro) — DB er en prod-kopi, så vedlegg-referanser
      # peker på prod-filnavn. Read-only hindrer at demo-stacken muterer prod-filer (rotårsak-sikring,
      # ikke kode-skrivesperre). Demo-manuset unngår opplasting. Fjern :ro hvis appen trenger å skrive.
      - /home/kemyrhau/stack/sitedoc/uploads:/app/apps/api/uploads:ro
    security_opt: ["no-new-privileges:true"]

  sitedoc-redesign-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        API_PORT: "3501"                    # bakes inn i Next-rewrite ved build (redesign-api lytter 3501)
        NEXT_PUBLIC_NY_NAV_DEFAULT: "1"     # ny nav default-PÅ i denne stacken (bakes inn ved build; prod/test usatt)
    image: sitedoc-redesign-web:latest
    container_name: sitedoc-redesign-web
    restart: unless-stopped
    env_file: ./env/web-redesign.env       # AUTH_* (egen), AUTH_URL/NEXTAUTH_URL=https://redesign.sitedoc.no, DATABASE_URL (sitedoc_redesign), NEXT_PUBLIC_NY_NAV_DEFAULT=1 ...
    environment:
      PORT: "3500"
    network_mode: "service:sitedoc-redesign-api"
    depends_on: [sitedoc-redesign-api]
    security_opt: ["no-new-privileges:true"]

# embed / oversettelse / postgres bor i prod-compose (docker-compose.yml).
# redesign-api når dem via det delte, eksterne nettet 'appnet' på tjenestenavn.
networks:
  appnet:
    external: true
